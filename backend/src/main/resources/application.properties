# Server
server.port=3333
server.error.include-message=always

# Database (usando vari·veis de ambiente)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurante_bricio}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:restaurante-bricio-super-secret-key-2024}
jwt.expiration=86400000

# Mercado Pago
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:}

# Unsplash
unsplash.access.key=${UNSPLASH_ACCESS_KEY:}
unsplash.secret.key=${UNSPLASH_SECRET_KEY:}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile