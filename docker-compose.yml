version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: restaurante_postgres
    environment:
      POSTGRES_DB: restaurante_bricio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restaurante_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurante_backend
    ports:
      - "3333:3333"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurante_bricio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      MERCADOPAGO_ACCESS_TOKEN: APP_USR-2340588140879621-040114-b213ead52ad6bcb0363d98b7ea33f909-118203676
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - restaurante_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurante_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3333/api
    depends_on:
      - backend
    networks:
      - restaurante_network
    restart: unless-stopped

networks:
  restaurante_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local